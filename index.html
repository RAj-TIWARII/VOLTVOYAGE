<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VOLTVOYAGE</title>
    <link rel="icon" type="image/png" href="voltvoyageicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <style>
        .site-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 0;
        }

        .text-shyblue {
            background: linear-gradient(to right, #4e9af1, #6fb3f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body {
            background: #dbeeff;
        }

        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .login-box img {
            height: 100px;
            margin-bottom: 1rem;
        }

        .form-control {
            border-radius: 20px;
            border: 1px solid #4e9af1;
            padding: 10px;
        }

        .btn-primary {
            background: #4e9af1;
            border: none;
            padding: 10px;
            border-radius: 20px;
        }

        .btn-primary:hover {
            background: #3a89d1;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #4e9af1;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="voltvoyageicon.png" alt="Logo" height="40" class="me-2">
                <span class="site-title text-shyblue">VOLTVOYAGE</span>
            </a>
        </div>
    </nav>
    <div class="login-container">
        <div class="login-box">
            <img src="voltvoyageicon.png" alt="VOLTVOYAGE Logo">
            <h2 class="site-title text-shyblue">VOLTVOYAGE</h2>
            <form>
                <div class="mb-3">
                    <input type="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="mb-3 password-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                    <i class="bi bi-eye-slash" id="togglePassword"></i>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
        </div
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("togglePassword").addEventListener("click", function () {
            const passwordField = document.getElementById("password");
            if (passwordField.type === "password") {
                passwordField.type = "text";
                this.classList.remove("bi-eye-slash");
                this.classList.add("bi-eye");
            } else {
                passwordField.type = "password";
                this.classList.remove("bi-eye");
                this.classList.add("bi-eye-slash");
            }
        });
    </script>
</body>

</html>
