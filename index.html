<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOLTVOYAGE - Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    body {
      background: radial-gradient(circle, #1b2735, #090a0f);
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
    }
    /* Navbar */
    .navbar-custom {
      background-color: #000;
      padding: 10px;
    }
    .navbar-brand {
      font-weight: bold;
      font-size: 1.8rem;
      color: #fff !important;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      position: relative;
    }
    .nav-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
    }
    /* Main container: two columns on desktop */
    .main-container {
      min-height: calc(100vh - 56px);
    }
    /* Banner column (left) */
    .banner-column {
      background: url('https://i.pinimg.com/736x/8d/9e/ef/8d9eef01fb36303f2039fc2eebb80e45.jpg') no-repeat center center;
      background-size: cover;
      min-height: 90vh;
    }
    /* Login column (right) */
    .login-column {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 90vh;
    }
    .login-card {
      background: rgba(0, 0, 0, 0.85);
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
      max-width: 400px;
      width: 100%;
    }
    .login-card h2 {
      color: #ffbf00;
      font-weight: bold;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card h2 i {
      margin-right: 10px;
    }
    .form-control {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      margin-bottom: 15px;
      padding: 12px;
      border-radius: 8px;
    }
    .form-control::placeholder {
      color: #bbb;
    }
    .btn-custom {
      width: 100%;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      border: none;
      color: #fff;
      font-weight: bold;
      border-radius: 5px;
      padding: 12px;
      transition: 0.3s;
    }
    .btn-custom:hover {
      background: linear-gradient(45deg, #0072ff, #00c6ff);
      transform: scale(1.05);
    }
    @media (max-width: 767.98px) {
      /* Hide banner on mobile */
      .banner-column {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-custom">
    <div class="container">
      <img src="voltvoyage.gif" alt="Nav Icon" class="nav-icon">
      <a class="navbar-brand mx-auto" href="#">
        <i class="bi bi-rocket"></i> VOLTVOYAGE
      </a>
    </div>
  </nav>
  
  <!-- Main Content -->
  <div class="container-fluid main-container">
    <div class="row">
      <!-- Banner Column (visible on md and up) -->
      <div class="col-md-3 banner-column d-none d-md-block"></div>
      <!-- Login Column -->
      <div class="col-12 col-md-9 login-column">
        <div class="login-card">
          <h2><i class="bi bi-rocket"></i> SPACE ACCESS</h2>
          <input type="email" class="form-control" placeholder="Enter your Gmail">
          <input type="password" class="form-control" placeholder="Enter your Password">
          <div class="form-check text-start mb-3">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label" for="rememberMe">Remember Me</label>
          </div>
          <button class="btn btn-custom" onclick="enterSite()">Launch</button>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    function enterSite() {
      let email = document.querySelector('input[type="email"]').value;
      let password = document.querySelector('input[type="password"]').value;
      if (email === "" || password === "") {
        alert("Please enter your Gmail and Password");
      } else {
        document.body.innerHTML = `<div class="container text-center"><h1>Welcome, ${email}</h1><p>Initializing Ghost Mode...</p></div>`;
        setTimeout(() => { window.location.href = 'nextpage.html'; }, 2000);
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
